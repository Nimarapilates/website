  legal_name: "Re:Connect Reformer Pilates S.L."
  trading_name: "Re:Connect"
  display_name: "RE:CONNECT"
  tagline: "Reconnect with yourself."
  secondary_taglines:
    - "Move. Breathe. Reconnect."
