# ============================================================
# BRAND STORY & POSITIONING
# ============================================================

brand_story:
  name_origin: >
    The colon in Re:Connect is intentional — it signals a restart,
    a return to something essential. In a world of noise and
    distraction, the studio is a place to reconnect: with your
    body, your breath, and yourself.
  ethos: >
    We believe Pilates is not a workout — it is a practice. Every
    session is an opportunity to move with intention, build strength
    from the inside out, and leave feeling more aligned than when
    you arrived.
  positioning: >
    Re:Connect is positioned as the premium Reformer Pilates
    experience in Palma de Mallorca. We are not a fitness chain,
    not a budget studio, and not a trend. We are a considered,
    design-led space for people who value quality, expertise,
    and a moment of calm in their day.

  differentiators:
    - "Intimate classes: maximum 8 clients per session on Balanced Body Allegro 2 Reformers."
    - "Design-led studio: warm oak, natural stone, Calke Green accents, curated B&W Mallorcan photography."
    - "Expert instruction: qualified, experienced instructors who know every client by name."
    - "Son Espanyolet location: a quiet, residential setting away from the tourist bustle."
    - "Bilingual: seamless English and Spanish service for Palma's international community."

  target_audience:
    primary: >
      Affluent residents of Son Espanyolet, Santa Catalina, and
      surrounding areas aged 30-60. International expats (particularly
      Scandinavian, British, German) and design-conscious locals.
      Health-aware, time-poor professionals and retirees who value
      quality over price.
    secondary: >
      Visitors and seasonal residents staying in premium accommodation
      in Palma. Wellness-focused travellers looking for a single
      drop-in or short-term class pack.

# ============================================================
# SERVICES & CLASSES
# ============================================================

services:
  equipment:
    reformers: "Balanced Body Allegro 2"
    quantity: 8
    note: "Industry-leading equipment, maintained to the highest standard."

  classes:
    - name: "Reformer Fundamentals"
      slug: "fundamentals"
      duration: 50
      capacity: 8
      summary: >
        A foundational class for those new to Reformer Pilates or
        returning after a break. Focus on alignment, breath, and
        the core principles of the method.

    - name: "Reformer Flow"
      slug: "flow"
      duration: 50
      capacity: 8
      summary: >
        A dynamic, flowing class connecting movements with breath.
        Builds strength, flexibility, and body awareness through
        continuous, intentional sequences.

    - name: "Reformer Sculpt"
      slug: "sculpt"
      duration: 50
      capacity: 8
      summary: >
        An athletic, strength-focused class using the full range
        of the Reformer. Targeted work for glutes, core, arms,
        and back with controlled intensity.

    - name: "Reformer Restore"
      slug: "restore"
      duration: 50
      capacity: 8
      summary: >
        A slower, deeper practice emphasising mobility, stretch,
        and release. Ideal for recovery days or as a complement
        to more intense training.

    - name: "Private Session"
      slug: "private"
      duration: 55
      capacity: 1
      summary: >
        One-to-one instruction tailored entirely to your goals,
        body, and experience level. The most personalised way
        to practise.

    - name: "Duet Session"
      slug: "duet"
      duration: 55
      capacity: 2
      summary: >
        Semi-private instruction for two. Share the session with
        a partner, friend, or colleague while receiving focused,
        personalised guidance.

  pricing:
    note: >
      Pricing is positioned above local competitors to reflect
      the premium experience. Founding member rates offer a
      meaningful discount to early adopters.
    drop_in: { price: 38, currency: "EUR", note: "Single class" }
    pack_5: { price: 170, currency: "EUR", per_class: 34, validity: "2 months" }
    pack_10: { price: 300, currency: "EUR", per_class: 30, validity: "3 months" }
    monthly_4: { price: 140, currency: "EUR", per_class: 35, note: "4 classes/month" }
    monthly_8: { price: 250, currency: "EUR", per_class: 31.25, note: "8 classes/month" }
    unlimited: { price: 320, currency: "EUR", note: "Unlimited classes" }
    private_session: { price: 75, currency: "EUR" }
    duet_session: { price: 95, currency: "EUR", note: "Total, not per person" }

    founding_member:
      note: "Limited availability. Available during pre-launch and first month of opening."
      monthly_unlimited: { price: 260, currency: "EUR", note: "Locked rate for 12 months" }
      annual_unlimited: { price: 2600, currency: "EUR", note: "Pay upfront, save 2 months" }

# ============================================================
# VISUAL IDENTITY
# ============================================================

logos:
  primary_light:
    file: "logos/reconnect-dark.svg"
    description: "Full wordmark 'RE:CONNECT' in warm charcoal, for use on light/sand backgrounds."
    usage: "Default logo on all light backgrounds."

  primary_dark:
    file: "logos/reconnect-light.svg"
    description: "Full wordmark 'RE:CONNECT' in cream/white, for use on dark or green backgrounds."
    usage: "Use on dark backgrounds and Calke Green surfaces."

  icon:
    file: "logos/reconnect-icon.svg"
    description: "Monogram mark (R:C ligature or abstract colon motif). For favicons, app icons, social avatars."
    usage: "Use when full wordmark won't fit."

  subline:
    text: "Studio Pilates"
    note: "Appears below the wordmark on the storefront and select print materials. Optional on digital."

  clear_space: "Minimum clear space around logo equals the height of the colon in RE:CONNECT."
  minimum_size: "Do not reproduce the full wordmark smaller than 100px wide on screen or 25mm in print."

  style_notes: >
    The wordmark uses a refined, medium-weight sans-serif with generous letter-spacing.
    The colon is a distinctive brand element — it should always be present (RE:CONNECT,
    not RECONNECT or RE CONNECT). On the physical storefront, the space between RE and
    CONNECT may be used for stylistic effect, but digitally the colon is mandatory.

colours:
  palette:
    - name: "Dune"
      role: "Warm neutral — primary background for light sections, card backgrounds"
      hex: "#C2A77D"
      rgb: "194, 167, 125"
      tailwind: "dune"

    - name: "Sand"
      role: "Light neutral — page background, spacious breathing room"
      hex: "#F5F0E8"
      rgb: "245, 240, 232"
      tailwind: "sand"

    - name: "Calke Green"
      role: "Primary accent — buttons, highlights, feature elements, brand moments"
      hex: "#5B7553"
      rgb: "91, 117, 83"
      tailwind: "green"

    - name: "Sage"
      role: "Soft green — hover states, secondary accents, muted green contexts"
      hex: "#8A9E82"
      rgb: "138, 158, 130"
      tailwind: "sage"

    - name: "Warm Charcoal"
      role: "Primary text colour, dark backgrounds, headings"
      hex: "#2C2C2C"
      rgb: "44, 44, 44"
      tailwind: "charcoal"

    - name: "Oak"
      role: "Warm mid-tone — decorative accents, borders, referencing timber materiality"
      hex: "#B08D57"
      rgb: "176, 141, 87"
      tailwind: "oak"

    - name: "Cream"
      role: "Lightest tone — text on dark backgrounds, clean white alternative"
      hex: "#FAF8F4"
      rgb: "250, 248, 244"
      tailwind: "cream"

    - name: "Stone"
      role: "Mid-neutral — secondary text, captions, muted body copy"
      hex: "#8C8577"
      rgb: "140, 133, 119"
      tailwind: "stone"

  usage_rules:
    - "The brand is light-first. Primary surfaces use Sand or Cream."
    - "Calke Green is the hero accent — use for CTAs, key highlights, and brand moments. It is not a background colour for large areas."
    - "Dune is used for warm card backgrounds, section accents, and the reception/retail area feel."
    - "Warm Charcoal for all headings and primary text. Never pure black (#000)."
    - "Stone for body copy and secondary text on light backgrounds."
    - "Oak is used sparingly as a decorative border/accent referencing the studio's timber materiality."
    - "Borders and dividers: Charcoal at 10-15% opacity on light backgrounds."
    - "Dark sections (e.g. footer, special features) may use Charcoal background with Cream text."

  gradients:
    - name: "Hero overlay"
      description: "Subtle gradient over hero images to ensure text readability."
      css: "linear-gradient(to bottom, rgba(245,240,232,0.3), rgba(245,240,232,0.8))"

    - name: "Warm fade"
      description: "Gentle transition between Sand and Cream sections."
      css: "linear-gradient(to bottom, #FAF8F4, #F5F0E8)"

typography:
  heading_font:
    name: "Cormorant Garamond"
    source: "Google Fonts"
    weights: [300, 400, 500, 600]
    fallbacks: ["Georgia", "serif"]
    note: >
      An elegant serif used for headings and display text. Conveys
      the refined, considered quality of the brand. The light weight
      (300) is the primary heading weight — sophisticated, not heavy.

  body_font:
    name: "DM Sans"
    source: "Google Fonts"
    weights: [300, 400, 500, 600]
    fallbacks: ["system-ui", "sans-serif"]
    note: >
      A clean, geometric sans-serif for body text, navigation, labels,
      and UI elements. Highly readable at all sizes. Pairs beautifully
      with Cormorant Garamond.

  scale:
    hero_heading: "text-5xl sm:text-6xl lg:text-7xl — Cormorant Garamond, font-light (300)"
    section_heading: "text-3xl sm:text-4xl — Cormorant Garamond, font-light (300)"
    section_label: "text-xs uppercase tracking-[0.2em] font-medium (500) — DM Sans, Calke Green"
    body: "text-base or text-lg — DM Sans, font-normal (400), Stone colour"
    small: "text-sm — DM Sans, font-normal (400)"
    caption: "text-xs — DM Sans, font-normal (400), Stone colour"
    nav: "text-sm — DM Sans, font-medium (500), uppercase, tracking-wide"
    price: "text-2xl — DM Sans, font-medium (500), Charcoal"

  rules:
    - "Headings always use Cormorant Garamond at font-light (300). Never bold for headings."
    - "Section labels are DM Sans, uppercase, tracked-out, medium weight, Calke Green."
    - "Body text uses Stone colour on light backgrounds, Cream on dark backgrounds."
    - "Line height: relaxed (1.7) for body copy. Tight (1.1) for hero headings."
    - "The colon in RE:CONNECT is always present in the wordmark. In running text, write 'Re:Connect'."

