  description: >
    Re:Connect is a premium Reformer Pilates studio in the heart
    of Palma de Mallorca's Son Espanyolet neighbourhood. We offer
    an intimate, design-led studio experience with world-class
    Balanced Body equipment, expert instructors, and a philosophy
    rooted in mindful movement and personal connection.
  founded_location: "Palma de Mallorca, Spain"
  website: "https://reconnectpilates.es"
  email: "hello@reconnectpilates.es"

  address:
    street: "C/ Joan Crespi, 45"
    city: "Palma de Mallorca"
    region: "Illes Balears"
    postcode: "07014"
    country: "Spain"
