      description: >
        Full-width, Sand or Cream background, with large atmospheric
        studio photograph at low opacity or as a side panel. Centred or
        left-aligned heading in Cormorant Garamond light, tagline in
        Stone, single CTA button in Calke Green.

    - name: "Content section"
      description: >
        Sand background, generous vertical padding. Section label in
        green above heading. Content in a comfortable max-width container.

    - name: "Split section"
      description: >
        Two-column layout: one side full-bleed image (studio interior
        or B&W Mallorcan photography), other side padded text content.
        Image always bleeds to the edge. Alternates left/right.

    - name: "Class card"
      description: >
        Cream background, subtle border (charcoal at 10% opacity),
        rounded corners. Class name in Cormorant Garamond, duration
        badge, short description in Stone, 'Book' CTA in Calke Green.

    - name: "Pricing card"
      description: >
        Sand background with a Calke Green top border (3px). Price
        prominently displayed in DM Sans medium. Features listed below.
        Featured/recommended tier gets a Calke Green background with
        Cream text.

    - name: "Instructor card"
      description: >
        Portrait photo (warm, natural light, not studio-shot), name
        in Cormorant Garamond, credentials in small DM Sans, short
        bio in Stone.

    - name: "Footer"
      description: >
        Charcoal background, Cream text. Logo, address, social links,
        newsletter signup, copyright. Clean, minimal, not cluttered.

  components:
    - name: "SectionLabel"
      description: "DM Sans, text-xs, uppercase, tracking-[0.2em], font-medium, Calke Green. Above headings."

    - name: "ButtonPrimary"
      description: "bg-green (Calke Green), text-cream, font-medium, text-sm, px-6 py-3, rounded-sm. Hover: bg-green/90."

    - name: "ButtonOutline"
      description: "border border-charcoal/30, text-charcoal, font-medium, text-sm, px-6 py-3, rounded-sm. Hover: bg-charcoal/5."

    - name: "Divider"
      description: "Full-width 1px line, bg-charcoal/10. Subtle section separator."

    - name: "BadgeDuration"
      description: "Inline badge showing class duration. bg-sand, text-stone, text-xs, rounded-full, px-3 py-1."

# ============================================================
# TONE OF VOICE
# ============================================================

tone_of_voice:
  summary: >
    Calm, warm, and assured. We speak with the quiet confidence
    of people who care deeply about what they do but don't need
    to shout about it. The tone is welcoming without being overly
    familiar, and refined without being cold.

  principles:
    - name: "Calm authority"
      description: >
        We know our practice inside out. We share that knowledge
        gently, never condescendingly. 'Your instructor will guide
        you through every movement' — not 'our world-class trainers
        will transform your body.'

    - name: "Warmth, not hype"
      description: >
        We welcome people in. The studio is a warm, considered
        space and the copy should feel the same. 'We'd love to
        see you' — not 'JOIN NOW and CRUSH YOUR GOALS.'

    - name: "Mindful, not preachy"
      description: >
        We believe in the practice but we don't evangelise. We
        let the experience speak. No wellness jargon, no pseudo-
        spiritual language, no toxic positivity.

    - name: "Specific and real"
      description: >
        We describe things concretely. '8 Balanced Body Allegro 2
        Reformers' — not 'state-of-the-art equipment.' 'Oak floors
        and natural stone' — not 'a luxurious environment.'

    - name: "Body-positive and inclusive"
      description: >
        Pilates is for every body. We never use language that
        implies a particular body type, weight loss as a goal,
        or before/after transformations. The benefits are strength,
        mobility, alignment, and wellbeing.

  do:
    - "Use 'we' and 'our' — the studio speaks as a team."
    - "Use sentence case for headings (not Title Case)."
    - "Write in short, clear sentences. 2-3 sentences per paragraph."
    - "Describe the feeling and experience, not just the features."
    - "Use 'practice' not 'workout' when referring to Pilates."
    - "Include both English and Spanish where possible."

  dont:
    - "Don't use superlatives (best, leading, world-class, unrivalled)."
    - "Don't use exclamation marks in brand copy."
    - "Don't use fitness-culture language (crush, burn, beast mode, no pain no gain)."
    - "Don't use 'luxury' — let the experience communicate that."
    - "Don't use weight-loss or body-shaming language."
    - "Don't use corporate buzzwords (solutions, leverage, synergy)."
    - "Don't use 'passion' or 'passionate'."
    - "Don't use pseudo-spiritual language (manifest, vibration, energy healing)."

  examples:
    good:
      - "Reconnect with yourself."
      - "Eight Reformers. Expert guidance. A space designed for focus."
      - "We keep classes small so your instructor knows your name, your body, and your goals."
      - "Your first class is an introduction — to the method, the equipment, and us."
      - "Pilates is not about perfection. It's about practice."
    bad:
      - "Experience the ULTIMATE Reformer Pilates journey!"
      - "Our world-class instructors will transform your body and mind!"
      - "Burn calories and sculpt your dream body on our luxury Reformers!"
      - "Align your chakras through the healing power of movement!"

# ============================================================
# PHOTOGRAPHY & IMAGERY STYLE
# ============================================================

photography:
  style: >
    Warm, natural, editorial. Images should feel calm and considered
    — morning light through the studio windows, a close-up of hands
    on the Reformer carriage, the timber and stone textures of the
    space. Not stock photography, not gym-aesthetic, not overly posed.

  subjects:
    - "The studio interior: Reformers, reception, materials, details"
    - "Clients in practice: natural, mid-movement, not posed or performative"
    - "Instructor guidance: hands-on adjustments, attentive teaching moments"
    - "Material textures: oak flooring, stone walls, green velvet, timber slats"
    - "Mallorcan context: B&W coastal landscapes, Bellver Castle, Mediterranean light"
    - "Post-class moments: the lounge, water, quiet conversation"

  treatment:
    - "Warm colour grading: soft, natural tones. Never cold or clinical."
    - "Full-opacity images in split sections. Low opacity (20-40%) with gradient overlay for hero backgrounds."
    - "B&W Mallorcan photography as a signature element — referencing the studio's wall murals."
    - "Avoid: gym-aesthetic shots, mirror selfies, before/after imagery, overly filtered or saturated images."

  mural_images:
    note: >
      The studio features two large B&W photographic murals: one of
      figures on a Mediterranean beach and one of Bellver Castle from
      the coast. These are signature brand elements that can be
      referenced in marketing material.

